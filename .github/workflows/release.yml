name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: |
          echo ${{ steps.version.outputs.version }} > VERSION

      - name: Generate release notes
        id: release-notes
        run: |
          # Extract changelog section for this version
          VERSION=${{ steps.version.outputs.version }}
          
          # Get content between this version and next version (or end)
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (extracted) exit
              if ($2 == "["ver"]") {
                extracted=1
                next
              }
            }
            extracted { print }
          ' CHANGELOG.md)
          
          # Fallback if no specific notes found
          if [ -z "$NOTES" ]; then
            NOTES="Version $VERSION release"
          fi
          
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "$NOTES" > release_notes.md

      - name: Update package.json versions
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Update root and workspaces
          npm version $VERSION --no-git-tag-version --workspaces --include-workspace-root

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json package-lock.json agent/package.json center/package.json cli/package.json 2>/dev/null || true
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || true
          git push || echo "Push failed, continuing"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node for NPM
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org/'

      - name: Publish openclaw to NPM
        run: |
          # Only publish the CLI package
          npm publish -w cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report
        if: always()
        run: |
          echo "Release ${{ steps.version.outputs.version }} created and published to NPM"
