name: Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.modified, 'CHANGELOG.md') || contains(github.event.head_commit.modified, 'SKILLS/') || contains(github.event.head_commit.modified, 'scripts/')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract last version
        id: last-version
        run: |
          LAST_VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/v//')
          if [ -z "$LAST_VERSION" ]; then
            LAST_VERSION="0.0.0"
          fi
          echo "version=$LAST_VERSION" >> $GITHUB_OUTPUT

      - name: Bump version
        id: new-version
        run: |
          IFS='.' read -ra PARTS <<< "${{ steps.last-version.outputs.version }}"
          MAJOR="${PARTS[0]}"
          MINOR="${PARTS[1]:-0}"
          PATCH="${PARTS[2]:-0}"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: |
          echo ${{ steps.new-version.outputs.version }} > VERSION

      - name: Update package.json
        run: |
          npm version ${{ steps.new-version.outputs.version }} --no-git-tag-version

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json package-lock.json 2>/dev/null || true
          git commit -m "chore: bump version to ${{ steps.new-version.outputs.version }}"
          git tag ${{ steps.new-version.outputs.tag }}
          git push || echo "Push failed, continuing..."
          git push origin ${{ steps.new-version.outputs.tag }} || echo "Tag push failed, continuing..."

      - name: Report
        if: always()
        run: |
          echo "Version bumped to ${{ steps.new-version.outputs.version }}"
          echo "Tag: ${{ steps.new-version.outputs.tag }}"
